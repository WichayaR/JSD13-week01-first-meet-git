<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Culinary Explorer - เสน่ห์สำรับไทย</title>
    <meta name="description" content="ร่วมค้นหาและสัมผัสความงามของวัฒนธรรมอาหารไทย 4 ภาค พร้อมทดลองคำนวณสัดส่วนวัตถุดิบและโภชนาการแบบเรียลไทม์">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Hero Header -->
        <header class="hero-banner">
            <div class="hero-content">
                <span class="sub-title">THE ART OF THAI CUISINE</span>
                <h1 id="main-title">เสน่ห์สำรับไทย</h1>
                <p class="hero-desc">สำรวจรสชาติอันเป็นเอกลักษณ์ของอาหารไทย 4 ภาค เรียนรู้ประวัติศาสตร์ วัตถุดิบ และโภชนาการแบบอินเตอร์แอคทีฟ</p>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="ค้นหาเมนูอาหาร... (เช่น ต้มยำกุ้ง, ผัดไทย)">
                    <button id="search-btn" class="btn-primary">ค้นหา</button>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <main class="main-content">
            <!-- Sidebar Controls -->
            <section class="controls-panel">
                <div class="panel-section">
                    <h3>ภูมิภาค (Regions)</h3>
                    <div class="filter-buttons" id="region-filters">
                        <button class="filter-btn active" data-region="all">ทั้งหมด</button>
                        <button class="filter-btn" data-region="Central">ภาคกลาง</button>
                        <button class="filter-btn" data-region="Northeast">ภาคอีสาน</button>
                        <button class="filter-btn" data-region="North">ภาคเหนือ</button>
                        <button class="filter-btn" data-region="South">ภาคใต้</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>เรียงลำดับ (Sorting)</h3>
                    <div class="sort-controls">
                        <select id="sort-select">
                            <option value="default">ค่าเริ่มต้น</option>
                            <option value="price-asc">ราคา: น้อยไปมาก</option>
                            <option value="price-desc">ราคา: มากไปน้อย</option>
                            <option value="spicy-asc">ความเผ็ด: น้อยไปมาก</option>
                            <option value="spicy-desc">ความเผ็ด: มากไปน้อย</option>
                        </select>
                    </div>
                </div>

                <div class="panel-section stats-panel">
                    <h3>สถิติข้อมูลสำรับ (Stats)</h3>
                    <div class="stat-card">
                        <span class="stat-label">รายการอาหารทั้งหมด:</span>
                        <span id="stat-count" class="stat-value">0</span>
                        <span class="stat-unit">เมนู</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">แคลอรีเฉลี่ย:</span>
                        <span id="stat-avg-calories" class="stat-value">0</span>
                        <span class="stat-unit">kcal</span>
                    </div>
                </div>
            </section>

            <!-- Gallery Grid -->
            <section class="gallery-container">
                <h2 class="section-title">สำรับอาหารยอดนิยม</h2>
                <div class="dishes-grid" id="dishes-grid">
                    <!-- Cards will be dynamically generated by array.js -->
                </div>
            </section>
        </main>

        <!-- Detailed Modal -->
        <div class="modal" id="detail-modal">
            <div class="modal-backdrop" id="modal-close-backdrop"></div>
            <div class="modal-content">
                <button class="modal-close-btn" id="modal-close-btn">&times;</button>
                <div class="modal-body" id="modal-body-content">
                    <!-- Dynamically populated by object.js -->
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="array.js"></script>
    <script src="object.js"></script>
</body>
</html>
